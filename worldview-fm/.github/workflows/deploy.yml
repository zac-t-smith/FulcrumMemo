name: Deploy WorldView-FM to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: worldview-fm/package-lock.json

      - name: Install dependencies
        run: cd worldview-fm && npm ci

      - name: Copy static events
        run: |
          if [ -f worldview-fm-agents/src/data/events.json ]; then
            cp worldview-fm-agents/src/data/events.json worldview-fm/public/events-static.json
          else
            echo "[]" > worldview-fm/public/events-static.json
          fi

      - name: Build
        run: cd worldview-fm && npm run build
        env:
          VITE_CESIUM_ION_TOKEN: ${{ secrets.VITE_CESIUM_ION_TOKEN }}
          VITE_AISSTREAM_KEY: ${{ secrets.VITE_AISSTREAM_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: worldview-fm/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

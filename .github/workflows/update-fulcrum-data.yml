name: Update Fulcrum Data v4

# Runs daily at 11:30 UTC (6:30 AM Central). FRED and Yahoo data both
# update around 6 AM Central, so this catches the day's release. Also
# runnable on-demand from the Actions tab.
on:
  schedule:
    - cron: "30 11 * * 1-5"  # weekdays only
  workflow_dispatch:
    inputs:
      long_lookback_years:
        description: "Years of history for long-history FRED series (default 50)"
        required: false
        default: "50"
      skip_etfs:
        description: "Skip ETF pipeline (FRED only)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: quant/requirements.txt

      - name: Install Python dependencies
        working-directory: quant
        run: pip install -r requirements.txt

      # FRED pipeline — stdlib only, no install needed beyond Python
      - name: Pull FRED data
        working-directory: quant
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          LOOKBACK_DAYS=$(( ${{ github.event.inputs.long_lookback_years || '50' }} * 365 ))
          python scripts/fetch_fred_data.py \
            --long-lookback-days $LOOKBACK_DAYS \
            --ts-dir ../src/data \
            --data-dir data \
            --summary-out fred_pull_summary.json

      - name: Show FRED summary
        working-directory: quant
        run: cat fred_pull_summary.json

      # ETF pipeline — uses yfinance from requirements.txt
      - name: Pull ETF data
        if: ${{ !inputs.skip_etfs }}
        working-directory: quant
        run: |
          python scripts/fetch_etf_data.py \
            --ts-dir ../src/data \
            --data-dir data \
            --summary-out etf_pull_summary.json

      - name: Show ETF summary
        if: ${{ !inputs.skip_etfs }}
        working-directory: quant
        run: cat etf_pull_summary.json

      - name: Check for changes
        id: git_check
        run: |
          if [[ -n "$(git status --porcelain quant/data/ src/data/)" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Files changed:"
            git status --porcelain quant/data/ src/data/
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No data changes — exiting clean."
          fi

      - name: Commit and push updated data
        if: steps.git_check.outputs.changed == 'true'
        run: |
          git config user.name "fulcrum-data-bot"
          git config user.email "fulcrum-data-bot@users.noreply.github.com"
          git add quant/data/ src/data/
          git commit -m "data: daily pull $(date -u +%Y-%m-%d)

          Auto-generated by .github/workflows/update-fulcrum-data.yml.

          See fred_pull_summary.json and etf_pull_summary.json for the
          per-series row counts and latest observations."
          git push

      - name: Upload summaries as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pull-summaries-${{ github.run_id }}
          path: |
            quant/fred_pull_summary.json
            quant/etf_pull_summary.json
          retention-days: 30
          if-no-files-found: warn

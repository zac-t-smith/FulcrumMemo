name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Build main Fulcrum Memo site first
      - name: Install main site dependencies
        run: npm install

      - name: Build main site
        run: npm run build

      # Copy index.html to 404.html for SPA routing
      - name: Setup SPA routing
        run: cp dist/index.html dist/404.html

      # Update events snapshot from agent data if available
      - name: Update events snapshot
        run: |
          if [ -f worldview-fm-agents/src/data/events.json ]; then
            cp worldview-fm-agents/src/data/events.json worldview-fm/public/events-static.json
            echo "Snapshot updated from agent data: $(wc -l < worldview-fm/public/events-static.json) lines"
          elif [ -f worldview-fm/public/events-static.json ]; then
            echo "Using existing snapshot: $(wc -l < worldview-fm/public/events-static.json) lines"
          else
            echo "WARNING: events-static.json not found - creating empty file"
            mkdir -p worldview-fm/public
            echo "[]" > worldview-fm/public/events-static.json
          fi

      # Build WorldView-FM
      - name: Install WorldView dependencies
        run: cd worldview-fm && npm install

      - name: Verify secrets
        run: |
          if [ -z "$VITE_CESIUM_ION_TOKEN" ]; then
            echo "WARNING: VITE_CESIUM_ION_TOKEN secret is NOT set - Cesium 3D globe will not load"
            echo "Set this secret in GitHub repo settings to enable the 3D globe"
          else
            echo "VITE_CESIUM_ION_TOKEN secret is set"
          fi
          if [ -z "$VITE_AISSTREAM_API_KEY" ]; then
            echo "WARNING: VITE_AISSTREAM_API_KEY secret is NOT set - Live AIS data will not work"
          else
            echo "VITE_AISSTREAM_API_KEY secret is set"
          fi
          echo "VITE_AGENT_URL: https://fulcrummemo-production.up.railway.app (hardcoded)"
        env:
          VITE_CESIUM_ION_TOKEN: ${{ secrets.VITE_CESIUM_ION_TOKEN }}
          VITE_AISSTREAM_API_KEY: ${{ secrets.VITE_AISSTREAM_API_KEY }}

      - name: Build WorldView
        run: cd worldview-fm && npm run build
        env:
          VITE_CESIUM_ION_TOKEN: ${{ secrets.VITE_CESIUM_ION_TOKEN }}
          VITE_AISSTREAM_API_KEY: ${{ secrets.VITE_AISSTREAM_API_KEY }}
          VITE_AGENT_URL: https://fulcrummemo-production.up.railway.app

      # Copy Cesium assets to dist (vite-plugin-cesium doesn't always copy them)
      - name: Copy Cesium assets
        run: |
          mkdir -p worldview-fm/dist/cesium
          cp -r worldview-fm/node_modules/cesium/Build/Cesium/. worldview-fm/dist/cesium/
          echo "Cesium assets copied: $(ls worldview-fm/dist/cesium/ | head -5)"

      # Combine both builds into one dist folder
      - name: Combine builds
        run: |
          mkdir -p combined-dist
          # Copy main site to root
          cp -r dist/. combined-dist/
          # Copy WorldView into subdirectory
          mkdir -p combined-dist/worldview-fm
          cp -r worldview-fm/dist/. combined-dist/worldview-fm/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: combined-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
